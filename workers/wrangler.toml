name = "qr-dynamic-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# KV namespaces (existing — kept for legacy redirect support during migration)
[[kv_namespaces]]
binding = "LINKS_KV"
id = "6ea066cd18ad447d829104166f115e2a"

[[kv_namespaces]]
binding = "STATS_KV"
id = "92480e03254043dfb2beb3aa741d0cb2"

# OAuth state 一時保存用 KV（既存を兼用）
[[kv_namespaces]]
binding = "AUTH_STATE_KV"
id = "6ea066cd18ad447d829104166f115e2a"

# D1 Database
# Create with: npx wrangler d1 create qr-dynamic-db
# Then paste the database_id below.
[[d1_databases]]
binding = "DB"
database_name = "qr-dynamic-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# Secrets (set via `wrangler secret put <NAME>`)
# ADMIN_TOKEN          — 旧管理トークン（移行期間中は残す）
# GOOGLE_CLIENT_ID     — Google OAuth App クライアントID
# GOOGLE_CLIENT_SECRET — Google OAuth App クライアントシークレット
# GITHUB_CLIENT_ID     — GitHub OAuth App クライアントID
# GITHUB_CLIENT_SECRET — GitHub OAuth App クライアントシークレット
# SESSION_SECRET       — セッションID署名用シークレット（32文字以上のランダム文字列）
# FRONTEND_URL         — フロントエンドURL（例: https://nigoh.github.io/qr-generator-web）
